<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - B-Monitor</title>
    <meta name="description" content="Sign in to B-Monitor System Access Portal for real-time water quality monitoring.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css?v=2">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card" id="loginCard">
            <!-- Logo & Branding -->
            <div class="auth-brand">
                <div class="auth-logo" id="authLogo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </div>
                <h1 class="auth-title">B-Monitor</h1>
                <p class="auth-subtitle">System Access Portal</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        class="form-input" 
                        placeholder="admin@facility.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <div class="form-label-row">
                        <label class="form-label" for="loginPassword">Password</label>
                        <a href="#" class="form-link" id="forgotPasswordLink">Forgot?</a>
                    </div>
                    <div class="input-password-wrapper">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="form-input" 
                            placeholder="••••••••" 
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="passwordToggle" onclick="togglePassword()">
                            <svg class="eye-icon eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-icon eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div class="form-error" id="loginError" style="display: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                    <span id="loginErrorText">Invalid email or password.</span>
                </div>

                <button type="submit" class="auth-btn primary" id="signInBtn">
                    <span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider"></div>

            <!-- Register Section -->
            <div class="register-section" id="registerSection">
                <p class="register-label">Field Team Registration</p>
                <a href="register.html" class="register-link" id="registerLink">
                    <span>Register New Worker Device</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <p class="auth-footer">&copy; 2026 B-Monitor &middot; LoRa-BandengMon</p>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('loginPassword');
            const eyeOpen = document.querySelector('.eye-open');
            const eyeClosed = document.querySelector('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }

        // Handle login form submission (frontend only — no backend wired)
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('signInBtn');
            const errorEl = document.getElementById('loginError');
            
            // Hide previous error
            errorEl.style.display = 'none';

            // Loading state
            btn.classList.add('loading');
            btn.disabled = true;

            // Simulate a brief delay then redirect to dashboard
            setTimeout(() => {
                btn.classList.remove('loading');
                btn.disabled = false;
                // For now, redirect straight to the dashboard
                window.location.href = 'index.html';
            }, 1200);
        }

        // Add subtle entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.auth-card').classList.add('visible');
        });
    </script>
</body>
</html>
